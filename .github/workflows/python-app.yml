name: Financial Lakehouse CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install pytest ruff flake8 pyspark

      - name: Run Ruff (fix)
        run: |
          ruff check . --fix

      - name: Run Ruff (check)
        run: |
          ruff check .

      - name: Run Tests
        run: |
          pytest

      - name: Validate Docker Compose
        run: |
          docker compose config
