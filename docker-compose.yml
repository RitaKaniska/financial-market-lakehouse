networks:
  data-pipeline-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-pipeline-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: ${AIRFLOW_IMAGE_NAME}
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --role Admin
      --username ${_AIRFLOW_WWW_USER_USERNAME}
      --password ${_AIRFLOW_WWW_USER_PASSWORD}
      --firstname Admin
      --lastname User
      --email admin@example.com
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-pipeline-net

  airflow-webserver:
    image: ${AIRFLOW_IMAGE_NAME}
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/airflow
      MINIO_ENDPOINT: http://minio:9000
      RAW_MARKET_PATH: s3a://raw-zone/market_data
      CURATED_STAGING_ROOT: s3a://curated-zone/staging
      CURATED_ROOT_PATH: s3a://curated-zone
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
    ports:
      - "8080:8080"
    networks:
      - data-pipeline-net
    command: webserver

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE_NAME}
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      PYTHONPATH: /opt/airflow
      MINIO_ENDPOINT: http://minio:9000
      RAW_MARKET_PATH: s3a://raw-zone/market_data
      CURATED_STAGING_ROOT: s3a://curated-zone/staging
      CURATED_ROOT_PATH: s3a://curated-zone
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
    networks:
      - data-pipeline-net
    command: scheduler

  minio:
    image: minio/minio:RELEASE.2023-08-29T23-07-35Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - data-pipeline-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init-buckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set localminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing localminio/raw-zone;
      mc mb --ignore-existing localminio/curated-zone;
      exit 0;
      "
    networks:
      - data-pipeline-net

  spark-master:
    image: apache/spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master --port 7077 --webui-port 8080
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./src:/opt/spark/src
      - ./data:/opt/spark/data
    networks:
      - data-pipeline-net

  spark-worker:
    image: apache/spark:3.5.1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker --webui-port 8081 spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./src:/opt/spark/src
      - ./data:/opt/spark/data
    depends_on:
      - spark-master
    networks:
      - data-pipeline-net

  streamlit:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      PYTHONPATH: /app
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      CURATED_FACT_TRADES_PATH: s3://curated-zone/fact_trades/*/*.parquet
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - data-pipeline-net
