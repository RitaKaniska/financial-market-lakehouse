name: Financial Lakehouse CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Cài các thư viện cần thiết để chạy Spark và Test
          pip install pytest ruff pyspark
          
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
          # Đăng ký thư mục hiện tại thành package để tránh lỗi import
          # Đảm bảo bạn có file setup.py hoặc pyproject.toml ở gốc
          pip install -e . 

      - name: Run Ruff (check)
        # Chạy check trước, nếu sai thì fail luôn để dev sửa ở local
        run: ruff check .

      - name: Run Tests
        env:
          # Ép Python tìm module ở thư mục gốc bất kể cấu trúc package
          PYTHONPATH: .
        run: |
          pytest

      - name: Validate Docker Compose
        run: |
          docker compose config
