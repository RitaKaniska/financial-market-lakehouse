name: Financial Lakehouse CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' # Tự động cache pip để các lần chạy sau nhanh hơn

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            # Cài đặt mọi thứ cùng lúc
            pip install -r requirements.txt pytest ruff pyspark
          else
            pip install pytest ruff pyspark
          fi
          pip install -e .

      - name: Run Ruff (check)
        # Chạy check trước, nếu sai thì fail luôn để dev sửa ở local
        run: ruff check .

      - name: Run Tests
        env:
          # Đảm bảo môi trường tìm thấy các module ngay cả khi không cài editable
          PYTHONPATH: .
          # Tránh lỗi Spark trên môi trường CI khi không có config UI
          SPARK_LOCAL_IP: "127.0.0.1"
        run: |
          pytest -v

      - name: Validate Docker Compose
        run: |
          # Kiểm tra file docker-compose.yml có đúng format không trước khi deploy
          docker compose config --quiet
